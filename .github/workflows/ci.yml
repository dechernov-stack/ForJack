name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install \
            pydantic>=2.7 \
            python-dotenv>=1.0 \
            typer>=0.12 \
            rich>=13.7 \
            langgraph>=0.2.50 \
            anthropic>=0.39.0 \
            httpx>=0.27 \
            tavily-python>=0.5 \
            sec-edgar-downloader>=5.0 \
            yt-dlp>=2024.10 \
            faster-whisper>=1.0 \
            tenacity>=8.0 \
            feedparser>=6.0 \
            sqlalchemy>=2.0 \
            psycopg2-binary>=2.9 \
            boto3>=1.35 \
            qdrant-client>=1.12 \
            pytest>=8.3 \
            pytest-asyncio>=0.24 \
            respx>=0.21 \
            ruff>=0.6

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests (excluding faithfulness which needs ANTHROPIC_API_KEY)
        run: |
          python -m pytest \
            --ignore=tests/test_faithfulness.py \
            --ignore=tests/test_e2e.py \
            -v \
            --tb=short
        env:
          LLM_PROVIDER: mock

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-and-test

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script:   /opt/storytelling-bot/deploy/update.sh

  faithfulness:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pydantic>=2.7 \
            anthropic>=0.39.0 \
            httpx>=0.27 \
            pytest>=8.3 \
            pytest-asyncio>=0.24

      - name: Run faithfulness + e2e tests
        run: |
          python -m pytest \
            tests/test_faithfulness.py \
            -v \
            --tb=short
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_PROVIDER: anthropic
